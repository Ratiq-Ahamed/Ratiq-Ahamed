<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Ratiq Ahamed, engineering intelligence for manufacturing</title>
  <desc id="desc">Animated scene of a young engineer operating an AI dashboard while a printing production line runs behind him.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131f"/><stop offset="0.55" stop-color="#0b2030"/><stop offset="1" stop-color="#07151a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#123649"/><stop offset="1" stop-color="#08212c"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" x2="1">
      <stop stop-color="#34d399"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lineClip"><rect x="662" y="286" width="486" height="50" rx="10"/></clipPath>
    <style>
      .txt{font-family:Inter,Segoe UI,Arial,sans-serif}.muted{fill:#8da4b3}.bright{fill:#effcff}
      .pulse{animation:pulse 2.1s ease-in-out infinite;transform-origin:center}.pulse2{animation:pulse 2.1s .7s ease-in-out infinite;transform-origin:center}
      .packet{animation:packet 3.4s linear infinite}.packet2{animation:packet 3.4s 1.7s linear infinite}
      .belt{animation:belt 2.8s linear infinite}.belt2{animation:belt 2.8s 1.4s linear infinite}
      .chart{stroke-dasharray:240;stroke-dashoffset:240;animation:draw 3s ease-in-out infinite alternate}
      .arm{animation:type .55s ease-in-out infinite alternate;transform-origin:444px 328px}.gear{animation:spin 5s linear infinite;transform-origin:1039px 194px}
      .cursor{animation:blink 1s step-end infinite}.scan{animation:scan 3s ease-in-out infinite}
      @keyframes pulse{50%{opacity:.35;transform:scale(.82)}} @keyframes packet{from{transform:translateX(0)}to{transform:translateX(360px)}}
      @keyframes belt{from{transform:translateX(0)}to{transform:translateX(420px)}} @keyframes draw{to{stroke-dashoffset:0}}
      @keyframes type{to{transform:rotate(-7deg)}} @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes blink{50%{opacity:0}} @keyframes scan{0%,100%{transform:translateY(0);opacity:.15}50%{transform:translateY(112px);opacity:.8}}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}.chart{stroke-dashoffset:0}}
    </style>
  </defs>
  <rect width="1200" height="440" rx="18" fill="url(#bg)"/>
  <path d="M0 344H1200M0 390H1200" stroke="#173343" stroke-width="1"/><path d="M80 0V440M1120 0V440" stroke="#102b38"/>

  <!-- identity -->
  <g class="txt">
    <text x="62" y="82" class="muted" font-size="16" font-weight="700" letter-spacing="3">AI × SOFTWARE × OPERATIONS</text>
    <text x="60" y="137" class="bright" font-size="45" font-weight="800">RATIQ AHAMED MR</text>
    <text x="62" y="177" fill="#41e5bd" font-size="20" font-weight="650">Intelligence for the factory floor.</text>
    <text x="62" y="218" class="muted" font-size="15">Director of Technology &amp; Business Operations</text>
    <text x="62" y="244" class="bright" font-size="15" font-weight="700">ULTRAKOTE</text>
    <g transform="translate(62 278)">
      <rect width="261" height="37" rx="18" fill="#0e2935" stroke="#1e5361"/>
      <circle cx="20" cy="18.5" r="5" fill="#34d399" class="pulse" filter="url(#glow)"/>
      <text x="37" y="24" fill="#b9d6dc" font-size="13">FACTORY SYSTEMS: ONLINE</text>
    </g>
  </g>

  <!-- engineer -->
  <g>
    <ellipse cx="491" cy="391" rx="102" ry="13" fill="#041016" opacity=".65"/>
    <path d="M424 365l8-91 50-24 51 29 15 86z" fill="#183c4b"/><path d="M482 250l18 33 19-30" fill="#effcff"/>
    <path d="M477 258l23 25 18-25-4 92h-32z" fill="#17a981"/>
    <circle cx="495" cy="214" r="43" fill="#b87852"/><path d="M454 209c2-42 32-53 61-42 18 7 25 29 20 49-10-17-22-27-39-31-12 11-25 17-42 18z" fill="#09151c"/>
    <path d="M457 210c-9-2-11 15-1 22M533 211c10-3 11 15 2 21" fill="none" stroke="#b87852" stroke-width="8" stroke-linecap="round"/>
    <path d="M480 220q15 11 30 0" fill="none" stroke="#6e382c" stroke-width="3" stroke-linecap="round"/>
    <path d="M447 300l-44 41 20 18 48-34" fill="#b87852"/><g class="arm"><path d="M529 302l-51 45 18 17 57-38" fill="#b87852"/></g>
    <rect x="386" y="346" width="142" height="15" rx="7" fill="#233d49"/><path d="M405 347l19-66h118l-15 66z" fill="#132d3a" stroke="#376071"/>
    <circle cx="473" cy="318" r="11" fill="none" stroke="#34d399" stroke-width="2"/><path d="M473 310v16m-8-8h16" stroke="#34d399"/>
  </g>

  <!-- AI control panel -->
  <g transform="translate(584 55)">
    <rect width="260" height="177" rx="10" fill="url(#screen)" stroke="#28566b"/>
    <circle cx="18" cy="18" r="4" fill="#fb7185"/><circle cx="31" cy="18" r="4" fill="#fbbf24"/><circle cx="44" cy="18" r="4" fill="#34d399"/>
    <text x="18" y="49" class="txt muted" font-size="10" letter-spacing="1.5">LIVE PRODUCTION INTELLIGENCE</text>
    <path d="M19 134L51 116l28 7 33-46 31 31 31-16 29 17 38-45" fill="none" stroke="#42e8bf" stroke-width="3" class="chart" filter="url(#glow)"/>
    <path d="M19 143H241" stroke="#254654"/><text x="18" y="162" class="txt" fill="#7de8d0" font-size="10">OUTPUT +18.4%</text>
    <rect x="184" y="150" width="57" height="16" rx="8" fill="#133c3b"/><circle cx="194" cy="158" r="3" fill="#34d399" class="pulse2"/><text x="201" y="161" class="txt" fill="#8ff4da" font-size="8">OPTIMAL</text>
    <rect x="0" y="0" width="260" height="2" fill="#57f5d1" opacity=".55" class="scan"/>
  </g>

  <!-- data packets -->
  <path d="M749 250H1070" stroke="#1b4b56" stroke-width="2" stroke-dasharray="5 8"/>
  <circle cx="751" cy="250" r="5" fill="#22d3ee" class="packet" filter="url(#glow)"/><circle cx="751" cy="250" r="4" fill="#34d399" class="packet2" filter="url(#glow)"/>

  <!-- printing line -->
  <g>
    <rect x="650" y="270" width="510" height="90" rx="12" fill="#0d2732" stroke="#244a59"/>
    <g clip-path="url(#lineClip)"><rect x="650" y="294" width="54" height="32" rx="3" fill="url(#sheet)" class="belt"/><rect x="650" y="294" width="54" height="32" rx="3" fill="url(#sheet)" class="belt2"/></g>
    <path d="M673 336H1139" stroke="#4f6f78" stroke-width="7" stroke-linecap="round"/>
    <g fill="#07151b" stroke="#52717a"><circle cx="700" cy="336" r="10"/><circle cx="775" cy="336" r="10"/><circle cx="850" cy="336" r="10"/><circle cx="925" cy="336" r="10"/><circle cx="1000" cy="336" r="10"/><circle cx="1075" cy="336" r="10"/></g>
    <path d="M871 286v-64h116v64M887 270v-32h84v32" fill="#173a47" stroke="#3f6674"/><rect x="899" y="245" width="60" height="17" rx="3" fill="#092029"/><text x="909" y="257" class="txt" fill="#50e8c4" font-size="8">RUNNING  02</text>
    <path d="M1003 286v-99h74v99" fill="#153441" stroke="#3f6674"/><g class="gear"><circle cx="1039" cy="194" r="18" fill="none" stroke="#22d3ee" stroke-width="4" stroke-dasharray="7 5"/><circle cx="1039" cy="194" r="5" fill="#34d399"/></g>
    <circle cx="1099" cy="288" r="6" fill="#34d399" class="pulse" filter="url(#glow)"/><text x="1111" y="292" class="txt" fill="#8db0bb" font-size="9">SYNC</text>
  </g>

  <text x="61" y="407" class="txt muted" font-size="11">BUILD  •  AUTOMATE  •  MEASURE  •  IMPROVE</text>
  <rect x="1143" y="397" width="2" height="14" fill="#43e9c0" class="cursor"/>
</svg>
